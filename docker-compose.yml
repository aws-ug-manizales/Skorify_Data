services:
  postgres:
    image: postgres:18.3-alpine
    container_name: skorify_db
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-polla_mundial}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-polla_mundial}']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
  localstack:
    container_name: skorify_localstack
    image: localstack/localstack:3.4.0
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=s3,iam      
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    


  knex:
    image: node:24-alpine
    container_name: skorify_setup
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-polla_mundial}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    entrypoint:
      - sh
      - -c
      - |
        set -e
        npm ci --no-audit --no-fund
        npx knex migrate:latest
        npx knex seed:run
    volumes:
      - ./:/workspace
      - knex_node_modules:/workspace/node_modules

  dev-server:
    image: node:24-alpine
    container_name: dev-server
    restart: unless-stopped
    working_dir: /workspace
    ports:
      - '${DEV_server_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      knex:
        condition: service_completed_successfully
    entrypoint:
      - sh
      - -c
      - |
         apk add --no-cache git
      - cd dev-server && npm ci --no-audit --no-fund && npm run dev
    volumes:
      - ./:/workspace
      - dev-server-node_modules:/workspace/node_modules

volumes:
  pgdata:
  knex_node_modules:
  dev-server-node_modules: