services:
  postgres:
    image: postgres:18.3-alpine
    container_name: skorify_db
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-polla_mundial}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-polla_mundial}']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  skorify_setup:
    image: node:24-alpine
    container_name: skorify_setup
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-polla_mundial}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - ./:/workspace
      - root_node_modules:/workspace/node_modules
    entrypoint:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache git build-base
        npm ci --no-audit --no-fund
        npm run build
        npx knex migrate:latest
        npx knex seed:run

  dev-server:
    image: node:24-alpine
    container_name: dev-server
    restart: unless-stopped
    working_dir: /workspace/dev-server
    ports:
      - '${DEV_server_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      skorify_setup:
        condition: service_completed_successfully
    volumes:
      - ./:/workspace
      - dev_server_node_modules:/workspace/dev-server/node_modules
    entrypoint:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache git
        npm install --no-audit --no-fund
        mkdir -p node_modules/skorifydata
        cp ../package.json node_modules/skorifydata/
        cp -r ../dist node_modules/skorifydata/
        echo "--- Iniciando App ---"
        npm run dev

volumes:
  pgdata:
  root_node_modules:
  dev_server_node_modules: