version: '3.8'

services:
  postgres:
    image: postgres:18.3-alpine
    container_name: skorify_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: polla_mundial
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
